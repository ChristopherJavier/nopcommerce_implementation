on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/NopCommerce.sln

      - name: Build solution
        run: dotnet build src/NopCommerce.sln --configuration Release --no-restore

      - name: Publish Nop.Web
        run: dotnet publish src/Presentation/Nop.Web/Nop.Web.csproj --configuration Release --output ./publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nopcommerce-publish
          path: ./publish
