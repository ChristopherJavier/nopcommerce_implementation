name: deploy

on:
  workflow_run:
    workflows:
      - build
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          worflow: build.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: nopcommerce-build
          path: publish

      - name: Extract artifact
        shell: pwsh
        run: |
          Expand-Archive artifact/nopcommerce-build.zip publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nopcommerce-implementation
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
